title: "corpus curiosum"
email: amandeepspdhr@gmail.com
description: >
  Blog about my ramblings in software engineering, from the most pedantic to the highly esoteric. 
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://amandeepsp.github.io"
github_username: amandeepsp
twitter_username: theamndeepsingh
linkedin_username: amandeepsp

# Build settings
theme: minima
plugins:
  - jekyll-feed
  - jemoji
  - jekyll-sitemap

markdown: kramdown
highlighter: rouge

kramdown:
  math_engine: katex
  input: GFM
  auto_ids: true
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'
      
show_excerpts: true
google_analytics: UA-112449883-1

disqus:
  shortname: amandeeps-blog

defaults:
  scope:
    path: "" # an empty string here means all files in the project
    type: "posts"
  values:
    is_post: true